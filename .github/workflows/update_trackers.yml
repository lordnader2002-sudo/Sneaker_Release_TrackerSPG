name: Update Sneaker Trackers

on:
  workflow_dispatch:
  schedule:
    # Noon + midnight Eastern:
    # - EDT: 12:00 = 16:00 UTC, 00:00 = 04:00 UTC
    # - EST: 12:00 = 17:00 UTC, 00:00 = 05:00 UTC
    - cron: "0 16,17 * * *"
    - cron: "0 4,5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sneaker-tracker-update
  cancel-in-progress: false

jobs:
  build-trackers:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run primary fetcher (GOAT via Playwright)
        shell: bash
        run: |
          mkdir -p data
          python fetch_releases_primary.py --days 35 --limit 300 --timeout 45 --output data/primary_releases.json || echo "[]" > data/primary_releases.json

      - name: Run all fallback fetchers (parallel)
        shell: bash
        run: |
          # Launch all scrapers in parallel and collect PIDs
          python fetch_release_fallback.py      --days 35 --output data/fallback_nike.json          &  PID_NIKE=$!
          python fetch_release_footlocker.py    --days 35 --output data/fallback_footlocker.json    &  PID_FL=$!
          python fetch_release_kicksonfire.py   --days 35 --output data/fallback_kicksonfire.json   &  PID_KOF=$!
          python fetch_release_solecollector.py --days 35 --output data/fallback_solecollector.json &  PID_SC=$!
          python fetch_release_hibbett.py       --days 35 --output data/fallback_hibbett.json       &  PID_HBT=$!
          python fetch_release_sneakernews.py   --days 35 --output data/fallback_sneakernews.json   &  PID_SNN=$!
          python fetch_release_thedropdate.py   --days 35 --output data/fallback_thedropdate.json   &  PID_TDD=$!

          # Wait for all and capture exit codes (failures are non-fatal)
          wait $PID_NIKE  || echo "⚠ Nike scraper failed (non-fatal)"
          wait $PID_FL    || echo "⚠ Foot Locker scraper failed (non-fatal)"
          wait $PID_KOF   || echo "⚠ KicksOnFire scraper failed (non-fatal)"
          wait $PID_SC    || echo "⚠ Sole Collector scraper failed (non-fatal)"
          wait $PID_HBT   || echo "⚠ Hibbett scraper failed (non-fatal)"
          wait $PID_SNN   || echo "⚠ SneakerNews scraper failed (non-fatal)"
          wait $PID_TDD   || echo "⚠ The Drop Date scraper failed (non-fatal)"

          # Ensure fallback files exist (empty array if scraper failed)
          for f in data/fallback_nike.json data/fallback_footlocker.json data/fallback_kicksonfire.json \
                   data/fallback_solecollector.json data/fallback_hibbett.json data/fallback_sneakernews.json \
                   data/fallback_thedropdate.json; do
            [ -f "$f" ] || echo "[]" > "$f"
          done

      - name: Merge, score, and compare
        run: |
          python merge_and_compare.py \
            --primary data/primary_releases.json \
            --fallback data/fallback_nike.json \
            --fallback data/fallback_kicksonfire.json \
            --fallback data/fallback_solecollector.json \
            --fallback data/fallback_footlocker.json \
            --fallback data/fallback_hibbett.json \
            --fallback data/fallback_sneakernews.json \
            --fallback data/fallback_thedropdate.json \
            --previous data/final_releases.json \
            --output data/final_releases.json \
            --changes data/changes.json \
            --archive-dir archive \
            --min-records 1 \
            --fuzzy-threshold 0.92 \
            --date-fuzz-days 1

      - name: Validate final output
        run: |
          python merge_and_compare.py --validate-only --primary data/final_releases.json --min-records 1
          
      - name: Enrich retail prices (best effort)
        shell: bash
        run: |
          python enrich_retail_prices.py data/final_releases.json --max 120 --timeout 25 --sleep 0.2 | tee data/retail_enrich_log.txt || true

      - name: Build workbook
        run: |
          python build_tracker_workbook.py \
            data/final_releases.json \
            --changes data/changes.json \
            --output output/monthly_tracker.xlsx
            
      - name: Write last-updated timestamp (GitHub Pages)
        shell: bash
        run: |
          mkdir -p public
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')" > public/last_updated.txt
          
      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: sneaker-trackers
          path: |
            data/retail_enrich_log.txt
            data/primary_releases.json
            data/fallback_nike.json
            data/fallback_sneakernews.json
            data/fallback_thedropdate.json
            data/fallback_kicksonfire.json
            data/fallback_solecollector.json
            data/final_releases.json
            data/changes.json
            output/monthly_tracker.xlsx
            data/sneakernews_debug.txt
            data/sneakernews_debug.html
            public/last_updated.txt
          if-no-files-found: error
          retention-days: 14

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            public/last_updated.txt \
            data/primary_releases.json \
            data/fallback_nike.json \
            data/fallback_footlocker.json \
            data/fallback_kicksonfire.json \
            data/fallback_solecollector.json \
            data/fallback_hibbett.json \
            data/fallback_sneakernews.json \
            data/fallback_thedropdate.json \
            data/final_releases.json \
            data/changes.json \
            output/monthly_tracker.xlsx \
            archive
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Automated tracker update"
          git push

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
