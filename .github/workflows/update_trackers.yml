name: Update Sneaker Trackers

on:
  workflow_dispatch:
  schedule:
    # Noon + midnight Eastern:
    # - EDT: 12:00 = 16:00 UTC, 00:00 = 04:00 UTC
    # - EST: 12:00 = 17:00 UTC, 00:00 = 05:00 UTC
    - cron: "0 16,17 * * *"
    - cron: "0 4,5 * * *"

permissions:
  contents: write

concurrency:
  group: sneaker-tracker-update
  cancel-in-progress: false

jobs:
  build-trackers:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run primary fetcher
        shell: bash
        run: |
          mkdir -p data
          node fetch_releases_primary.js --days 35 --output data/primary_releases.json || echo "[]" > data/primary_releases.json

      - name: Run fallback fetcher (Nike)
        run: |
          python fetch_release_fallback.py --days 35 --output data/fallback_nike.json

      - name: Run fallback fetcher (Foot Locker)
        run: |
          python fetch_release_footlocker.py --days 35 --output data/fallback_footlocker.json

      - name: Run fallback fetcher (KicksOnFire)
        run: |
          python fetch_release_kicksonfire.py --days 35 --output data/fallback_kicksonfire.json

      - name: Run fallback fetcher (The Drop Date)
        run: |
          python fetch_release_thedropdate.py --days 35 --output data/fallback_thedropdate.json
          
      - name: Run fallback fetcher Hibbett
        run: |
          python fetch_release_hibbett.py --days 35 --output data/fallback_hibbett.json          

      - name: Merge, score, and compare
        run: |
          python merge_and_compare.py \
            --primary data/primary_releases.json \
            --fallback data/fallback_nike.json \
            --fallback data/fallback_kicksonfire.json \
            --fallback data/fallback_thedropdate.json \
            --fallback data/fallback_footlocker.json \
            --fallback data/fallback_hibbett.json \
            --previous data/final_releases.json \
            --output data/final_releases.json \
            --changes data/changes.json \
            --archive-dir archive \
            --min-records 1 \
            --fuzzy-threshold 0.92 \
            --date-fuzz-days 1

      - name: Validate final output
        run: |
          python merge_and_compare.py --validate-only --primary data/final_releases.json --min-records 1
          
      - name: Enrich retail prices (best effort)
        shell: bash
        run: |
          python enrich_retail_prices.py data/final_releases.json --max 120 --timeout 25 --sleep 0.2 | tee data/retail_enrich_log.txt || true
          
      - name: Build workbooks
        run: |
          python build_tracker_workbook.py \
            data/final_releases.json \
            --changes data/changes.json \
            --weekly-output output/weekly_tracker.xlsx \
            --monthly-output output/monthly_tracker.xlsx
            
      - name: Write last-updated timestamp (GitHub Pages)
        shell: bash
        run: |
          mkdir -p public
          echo "Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')" > public/last_updated.txt
          
      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: sneaker-trackers
          path: |
            data/retail_enrich_log.txt
            data/primary_releases.json
            data/fallback_nike.json
            data/fallback_sneakernews.json
            data/fallback_kicksonfire.json
            data/fallback_thedropdate.json
            data/final_releases.json
            data/changes.json
            output/weekly_tracker.xlsx
            output/monthly_tracker.xlsx
            data/sneakernews_debug.txt
            data/sneakernews_debug.html
            public/last_updated.txt
          if-no-files-found: error
          retention-days: 14

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            public/last_updated.txt \
            data/primary_releases.json \
            data/fallback_nike.json \
            data/fallback_footlocker.json \
            data/fallback_kicksonfire.json \
            data/fallback_thedropdate.json \
            data/fallback_hibbett.json \
            data/final_releases.json \
            data/changes.json \
            output/weekly_tracker.xlsx \
            output/monthly_tracker.xlsx \
            archive
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Automated tracker update"
          git push
